<!doctype html>
<html lang="en">
	<head>
		<meta name="robots" content="index, follow" />
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>Client Reviews | Gotham Solutions</title>

		<meta
			name="description"
			content="See what clients say about Gotham Solutions and our custom spreadsheet systems, dashboards, and automation tools."
		/>

		<meta
			name="keywords"
			content="gotham solutions reviews, spreadsheet consultant reviews, spreadsheet services feedback"
		/>

		<link rel="canonical" href="https://solutions.gothamstudio.us/reviews/" />

		<link rel="icon" href="../icons/favicon.ico" />
		<link rel="stylesheet" href="../styles.css" />

		<meta property="og:type" content="website" />
		<meta property="og:title" content="Gotham Solutions Reviews" />
		<meta
			property="og:description"
			content="Client feedback for custom spreadsheet systems and automation solutions."
		/>
		<meta
			property="og:url"
			content="https://solutions.gothamstudio.us/reviews/"
		/>
		<meta
			property="og:image"
			content="https://solutions.gothamstudio.us/LogoSolo.png"
		/>
	</head>
	<!-- Google tag (gtag.js) -->
	<script
		async
		src="https://www.googletagmanager.com/gtag/js?id=G-5THVWHDDR2"
	></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag() {
			dataLayer.push(arguments);
		}
		gtag("js", new Date());

		gtag("config", "G-5THVWHDDR2");
	</script>

	<body>
		<div id="site-header"></div>

		<main>
			<section class="content-wrapper">
				<div class="hero">
					<h2>Client Reviews</h2>
					<p class="hero-text">
						What clients say about working with Gotham Solutions.
					</p>
				</div>

				<div id="review-average" class="review-average"></div>

				<p class="review-note">
					Reviews are collected from verified clients after completed projects.
				</p>

				<div id="reviews-loading" class="review-loading" aria-live="polite">
					<div class="review-loading-spinner" aria-hidden="true"></div>
					<h3>Loading reviews...</h3>
					<p>Pulling the latest client feedback now.</p>
				</div>

				<div
					id="reviews-error"
					class="review-error"
					aria-live="polite"
					style="display: none"
				>
					<h3>Couldn’t load reviews right now</h3>
					<p>Please refresh the page and try again in a moment.</p>
				</div>

				<div id="reviews-container" class="review-grid"></div>
			</section>
		</main>

		<div id="site-footer"></div>

		<script>
			const API =
				"https://script.google.com/macros/s/AKfycbwKmVo3ZUbQQKJZX6465AFCs7X93Y6zOUUWhPNcIFCREsZjv8862jFix98XCnKtpo5Diw/exec";

			const MAX_CHARS = 220;

			function escapeHTML(str) {
				const div = document.createElement("div");
				div.textContent = str;
				return div.innerHTML;
			}

			function buildReviewText(text, id) {
				const safeText = escapeHTML(text);

				if (safeText.length <= MAX_CHARS) {
					return `<p class="review-text">${safeText}</p>`;
				}

				const short = safeText.slice(0, MAX_CHARS) + "...";

				return `
			<p class="review-text">
				<span id="short-${id}">${short}</span>
				<span id="full-${id}" style="display:none;">${safeText}</span>
			</p>

			<button class="review-readmore" onclick="toggleReview('${id}')">
				Read More
			</button>
		`;
			}

			function toggleReview(id) {
				const short = document.getElementById("short-" + id);
				const full = document.getElementById("full-" + id);
				const button = short.parentElement.nextElementSibling;

				if (full.style.display === "none") {
					full.style.display = "inline";
					short.style.display = "none";
					button.textContent = "Show Less";
				} else {
					full.style.display = "none";
					short.style.display = "inline";
					button.textContent = "Read More";
				}
			}

			async function loadReviews() {
				const container = document.getElementById("reviews-container");
				const average = document.getElementById("review-average");
				const loading = document.getElementById("reviews-loading");
				const errorBox = document.getElementById("reviews-error");

				container.innerHTML = "";
				average.innerHTML = "";
				loading.style.display = "block";
				errorBox.style.display = "none";

				try {
					const res = await fetch(API);

					if (!res.ok) {
						throw new Error("Failed to fetch reviews");
					}

					const reviews = await res.json();

					loading.style.display = "none";

					if (!Array.isArray(reviews) || !reviews.length) {
						container.innerHTML = `
					<div class="review-empty">

						<div class="stars">★★★★★</div>

						<h3>Be the first to review Gotham Solutions</h3>

						<p>
							Gotham Solutions helps small businesses streamline
							their workflows with custom spreadsheet systems.
						</p>

						<p>
							Client reviews will appear here as projects are completed.
						</p>

						<br>

						<a href="/contact/" class="button-primary">
							Request a Custom Solution
						</a>

					</div>
				`;
						return;
					}

					let total = 0;
					let cards = "";

					reviews.forEach((r, i) => {
						const rating = Number(r.rating) || 0;
						total += rating;

						const stars = "★".repeat(rating);
						const reviewText = buildReviewText(r.review, i);

						cards += `
					<div class="review-card">

						<div class="stars">${stars}</div>

						${reviewText}

						<strong>${escapeHTML(r.name)}</strong>

					</div>
				`;
					});

					container.innerHTML = cards;

					const avg = (total / reviews.length).toFixed(1);

					average.innerHTML = "<strong>" + avg + " / 5</strong> average rating";
				} catch (error) {
					console.error("Review load error:", error);
					loading.style.display = "none";
					errorBox.style.display = "block";
				}
			}

			loadReviews();
		</script>
		<script>
			const params = new URLSearchParams(window.location.search);

			// ===== EXISTING PARAM STORAGE =====
			const template = params.get("template");
			const source = params.get("source");

			if (template) {
				sessionStorage.setItem("template", template);
			}

			if (source) {
				sessionStorage.setItem("source", source);
			}

			// ===== NEW: UTM SUPPORT =====
			const utm_source = params.get("utm_source");
			const utm_medium = params.get("utm_medium");
			const utm_campaign = params.get("utm_campaign");

			// fallback logic (prioritize UTMs, fallback to your existing params)
			const finalSource = utm_source || source || "direct";
			const finalMedium = utm_medium || "custom";
			const finalCampaign = utm_campaign || template || "general";

			// stored for later
			sessionStorage.setItem("utm_source", finalSource);
			sessionStorage.setItem("utm_medium", finalMedium);
			sessionStorage.setItem("utm_campaign", finalCampaign);

			// ===== SEND TO GOOGLE ANALYTICS =====
			if (typeof gtag === "function") {
				gtag("set", {
					campaign_source: finalSource,
					campaign_medium: finalMedium,
					campaign_name: finalCampaign,
				});

				// custom event for debug
				gtag("event", "traffic_attribution", {
					source: finalSource,
					medium: finalMedium,
					campaign: finalCampaign,
					template: template || "none",
				});
			}
		</script>
		<script src="/js/layout.js"></script>
	</body>
</html>
