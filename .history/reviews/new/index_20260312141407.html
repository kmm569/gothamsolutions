			const params = new URLSearchParams(window.location.search);
			const token = params.get("token");

			//document.getElementById("token").value = token;

			async function validateToken() {
				if (!token) {
					document.getElementById("status").innerText =
						"This review link is missing a token.";
					document.querySelector(".review-form").style.display = "none";
					return;
				}

				const res = await fetch(API + "?action=validate&token=" + token);
				const data = await res.json();

				if (!data.valid) {
					document.getElementById("status").innerText =
						"This review link is invalid or already used.";

					document.querySelector(".review-form").style.display = "none";
				} else {
					document.getElementById("status").innerText =
						"Submitting review for invoice " + data.invoice;
				}
			}

			validateToken();

			const form = document.querySelector(".review-form");

			form.addEventListener("submit", async function (e) {

			const stars = document.querySelectorAll("#starRating span");
			const ratingInput = document.getElementById("rating");

			let currentRating = 0;

			function paintStars(rating) {
				stars.forEach((star) => {
					const value = Number(star.dataset.value);

					if (value <= rating) {
						star.classList.add("active");
					} else {
						star.classList.remove("active");
					}
				});
			}

			paintStars(currentRating);

			stars.forEach((star) => {
				star.addEventListener("mouseover", () => {
					paintStars(star.dataset.value);
				});

				star.addEventListener("mouseout", () => {
					paintStars(currentRating);
				});

				star.addEventListener("click", () => {
					currentRating = Number(star.dataset.value);
					ratingInput.value = currentRating;
					paintStars(currentRating);
				});
			});
		</script>
