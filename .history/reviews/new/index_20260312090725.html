<!DOCTYPE html>
<html>

<head>

<title>Leave a Review | Gotham Solutions</title>

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<h1>Leave a Review</h1>

<p id="status"></p>

<form
	action="https://script.google.com/macros/s/AKfycbwKmVo3ZUbQQKJZX6465AFCs7X93Y6zOUUWhPNcIFCREsZjv8862jFix98XCnKtpo5Diw/exec"
	method="POST">

	<input type="hidden" name="token" id="token">

	<label>Your Name</label>
	<input name="name" required>

	<label>Rating</label>
	<select name="rating">

		<option value="5">★★★★★</option>
		<option value="4">★★★★</option>
		<option value="3">★★★</option>
		<option value="2">★★</option>
		<option value="1">★</option>

	</select>

	<label>Review</label>
	<textarea name="review" required></textarea>

	<button type="submit">Submit Review</button>

</form>

<script>

const API = "https://script.google.com/macros/s/AKfycbwKmVo3ZUbQQKJZX6465AFCs7X93Y6zOUUWhPNcIFCREsZjv8862jFix98XCnKtpo5Diw/exec";

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

document.getElementById("token").value = token;

async function validateToken(){

	const res = await fetch(API + "?action=validate&token=" + token);

	const data = await res.json();

	if(!data.valid){

		document.getElementById("status").innerText =
			"This review link is invalid or already used.";

		document.querySelector("form").style.display = "none";

	}else{

		document.getElementById("status").innerText =
			"Review for invoice " + data.invoice;

	}

}

validateToken();

</script>

</body>

</html>
