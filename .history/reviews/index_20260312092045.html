<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Client Reviews | Gotham Solutions</title>
	<link rel="stylesheet" href="../styles.css">
</head>

<body>

<header>

	<div class="container nav-container">

		<div class="logo">
			<img src="../LogoSolo.png" alt="Gotham Solutions Logo">
		</div>

		<nav>
			<ul class="nav-links">
				<li><a href="/">Home</a></li>
				<li><a href="/about/">About</a></li>
				<li><a href="/templates/">Templates</a></li>
				<li><a href="/contact/">Contact</a></li>
				<li><a href="/reviews/">Reviews</a></li>
			</ul>
		</nav>

	</div>

</header>


<section class="hero">

	<div class="container">

		<h1>Client Reviews</h1>
		<p>What clients say about working with Gotham Solutions.</p>

	</div>

</section>


<section class="content">

	<div class="container">

		<div id="review-average" class="review-average"></div>

		<div id="reviews-container" class="review-grid"></div>

	</div>

</section>


<footer>

	<div class="container">
		<p>© Gotham Solutions</p>
	</div>

</footer>


<script>

const API = "https://script.google.com/macros/s/AKfycbwKmVo3ZUbQQKJZX6465AFCs7X93Y6zOUUWhPNcIFCREsZjv8862jFix98XCnKtpo5Diw/exec";

async function loadReviews(){

	const res = await fetch(API);
	const reviews = await res.json();

	const container = document.getElementById("reviews-container");

	let total = 0;

	reviews.forEach(r => {

		total += Number(r.rating);

		const stars = "★".repeat(r.rating);

		container.innerHTML += `
			<div class="review-card">

				<div class="stars">${stars}</div>

				<p>${r.review}</p>

				<strong>${r.name}</strong>

			</div>
		`;

	});

	if(reviews.length){

		const avg = (total / reviews.length).toFixed(1);

		document.getElementById("review-average").innerHTML =
			"<strong>" + avg + " / 5</strong> average rating";

	}

}

loadReviews();

</script>

</body>
</html>
