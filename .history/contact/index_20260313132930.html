<!doctype html>
<html lang="en">
	<head>

	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<title>Contact Gotham Solutions | Custom Spreadsheet Consulting</title>

	<meta name="description"
	content="Contact Gotham Solutions to discuss custom spreadsheet design, automation, and dashboard systems for your business." />

	<meta name="keywords"
	content="contact spreadsheet consultant, custom spreadsheet help, spreadsheet design consulting" />

	<link rel="canonical" href="https://solutions.gothamstudio.us/contact/" />

	<link rel="icon" href="../icons/favicon.ico" />
	<link rel="stylesheet" href="../styles.css" />

	<meta property="og:type" content="website" />
	<meta property="og:title" content="Contact Gotham Solutions" />
	<meta property="og:description" content="Reach out for custom spreadsheet design and automation systems." />
	<meta property="og:url" content="https://solutions.gothamstudio.us/contact/" />
	<meta property="og:image" content="https://solutions.gothamstudio.us/LogoSolo.png" />

</head>

	<body>
		<header>
			<div class="logo-container">
				<img
					href="/"
					src="LogoSolo.png"
					alt="Gotham Solutions Logo"
					class="logo"
				/>
				<h1>Gotham Solutions</h1>
			</div>

			<nav>
				<ul>
					<li><a href="/" class="nav-link">Home</a></li>
					<li><a href="/services/" class="nav-link">Services</a></li>
					<li><a href="/templates/" class="nav-link">Templates</a></li>
					<li><a href="/about/" class="nav-link">About</a></li>
					<li><a href="/contact/" class="nav-link">Contact</a></li>
					<li><a href="/reviews/" class="nav-link">Reviews</a></li>
					<li><a href="/faq/" class="nav-link">FAQ</a></li>
				</ul>
			</nav>
		</header>

		<main>
			<section class="contact-section">
				<div class="form-card">
					<h2>Request a Quote</h2>

					<form id="contactForm">
						<label>Name *</label>
						<input
							type="text"
							name="name"
							required
							minlength="2"
							placeholder="Your name"
						/>

						<label>Email *</label>
						<input
							type="email"
							name="email"
							required
							placeholder="you@email.com"
						/>

						<label>Phone (optional)</label>
						<input
							type="tel"
							id="phone"
							name="phone"
							pattern="[0-9+\-\(\)\s]{7,}"
							placeholder="(555) 555-5555"
							inputmode="numeric"
						/>

						<label>Project Type</label>
						<select name="projectType">
							<option value="">Select a project type</option>
							<option>Google Sheets Dashboard</option>
							<option>Spreadsheet Automation</option>
							<option>Workflow Tracker</option>
							<option>Data Cleanup / Organization</option>
							<option>Other</option>
						</select>

						<label>Tell me about the project</label>

						<textarea
							name="details"
							rows="4"
							placeholder="Describe what you're trying to build..."
						></textarea>

						<label>Budget</label>

						<select name="budget">
							<option value="">Select a budget</option>
							<option>Unsure</option>
							<option>Under $50</option>
							<option>$50 – $150</option>
							<option>$150 – $500</option>
							<option>$500+</option>
						</select>

						<input type="hidden" name="template" id="templateField" />
						<input type="hidden" name="source" id="sourceField" />

						<button type="submit" class="submit-button">Send Inquiry</button>
					</form>

					<div id="formMessage"></div>
				</div>
			</section>
		</main>

		<footer>
			<p>&copy; 2026 Gotham Solutions</p>
		</footer>

		<script>
			const scriptURL =
				"https://script.google.com/macros/s/AKfycbxc9_hlQCGvBhvR8CTxNIYGdBt7pfNBy3m51jCEInJPqs_rvo7NSJcQvLVQ2DQR7OGX/exec";

			const form = document.getElementById("contactForm");
			const templateField = document.getElementById("templateField");
			const sourceField = document.getElementById("sourceField");
			const messageBox = document.getElementById("formMessage");

			const params = new URLSearchParams(window.location.search);

			const storedTemplate = sessionStorage.getItem("template");
			const storedSource = sessionStorage.getItem("source");

			if (params.has("template")) {
				templateField.value = params.get("template");
				sessionStorage.setItem("template", params.get("template"));
			} else if (storedTemplate) {
				templateField.value = storedTemplate;
			}

			if (params.has("source")) {
				sourceField.value = params.get("source");
				sessionStorage.setItem("source", params.get("source"));
			} else if (storedSource) {
				sourceField.value = storedSource;
			} else {
				sourceField.value = "Website";
			}

			let submitting = false;

			form.addEventListener("submit", function (e) {
				if (submitting) {
					return;
				}

				submitting = true;

				e.preventDefault();

				const submitBtn = form.querySelector("button");
				submitBtn.disabled = true;
				submitBtn.textContent = "Sending...";

				const formData = new FormData(form);
				const data = Object.fromEntries(formData.entries());

				e.preventDefault();

				fetch(scriptURL, {
					method: "POST",
					mode: "no-cors",
					body: formData,
				})
					.then(() => {
						setTimeout(() => {
							submitting = false;
							submitBtn.disabled = false;
							submitBtn.textContent = "Send Inquiry";
						}, 60000);

						form.style.display = "none";

						messageBox.style.display = "block";
						messageBox.innerHTML =
							"<strong>Thanks! Your inquiry has been sent.</strong><br>I usually respond within 24 hours.";
					})
					.catch((err) => {
						console.error(err);

						messageBox.style.display = "block";
						messageBox.innerHTML = "Something went wrong. Please try again.";
					});
			});

			const phoneInput = document.getElementById("phone");

			if (phoneInput) {
				phoneInput.addEventListener("input", function (e) {
					let digits = e.target.value.replace(/\D/g, "").substring(0, 10);

					let formatted = digits;

					if (digits.length > 6) {
						formatted =
							"(" +
							digits.substring(0, 3) +
							") " +
							digits.substring(3, 6) +
							"-" +
							digits.substring(6);
					} else if (digits.length > 3) {
						formatted =
							"(" + digits.substring(0, 3) + ") " + digits.substring(3);
					} else if (digits.length > 0) {
						formatted = "(" + digits;
					}

					e.target.value = formatted;
				});
			}

			/*const header = document.querySelector("header");

			let isShrunk = false;

			const shrinkPoint = 120;
			const expandPoint = 40;

			window.addEventListener("scroll", () => {
				const scroll = window.scrollY;

				if (!isShrunk && scroll > shrinkPoint) {
					header.classList.add("scrolled");
					isShrunk = true;
				}

				if (isShrunk && scroll < expandPoint) {
					header.classList.remove("scrolled");
					isShrunk = false;
				}
			});*/
		</script>
	</body>
</html>
