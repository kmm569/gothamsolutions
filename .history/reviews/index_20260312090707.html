<!DOCTYPE html>
<html>

<head>

<title>Client Reviews | Gotham Solutions</title>

<link rel="stylesheet" href="/styles.css">

</head>

<body>

<h1>Client Reviews</h1>

<div id="review-average"></div>

<div id="reviews-container"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwKmVo3ZUbQQKJZX6465AFCs7X93Y6zOUUWhPNcIFCREsZjv8862jFix98XCnKtpo5Diw/exec";

async function loadReviews(){

	const res = await fetch(API);

	const reviews = await res.json();

	const container = document.getElementById("reviews-container");

	let total = 0;

	reviews.forEach(r => {

		total += Number(r.rating);

		const stars = "★".repeat(r.rating);

		container.innerHTML += `
		<div class="review-card">

			<div class="stars">${stars}</div>

			<p>${r.review}</p>

			<strong>${r.name}</strong>

		</div>
		`;

	});

	if(reviews.length > 0){

		const avg = (total / reviews.length).toFixed(1);

		document.getElementById("review-average").innerText =
			"Average Rating: " + avg + " / 5";

	}

}

loadReviews();

</script>

</body>

</html>
