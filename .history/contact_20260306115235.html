<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Contact - Gotham Solutions</title>

	<link rel="stylesheet" href="styles.css">
<link rel="icon" href="./icons/favicon.ico">
</head>

<body>

<header>

	<div class="logo-container">
		<img src="LogoSolo.png" alt="Gotham Solutions Logo" class="logo">
		<h1>Gotham Solutions</h1>
	</div>

	<nav>
		<ul>
			<li><a href="index.html" class="nav-link">Home</a></li>
			<li><a href="about.html" class="nav-link">About</a></li>
			<li><a href="contact.html" class="nav-link">Contact</a></li>
		</ul>
	</nav>

</header>

<main>

<section class="form-card">

<h2>Request a Quote</h2>

<form id="contactForm">

	<label>Name *</label>
	<input
		type="text"
		name="name"
		required
		minlength="2"
		placeholder="Your name"
	>

	<label>Email *</label>
	<input
		type="email"
		name="email"
		required
		placeholder="you@email.com"
	>

	<label>Phone (optional)</label>
	<input
		type="tel"
		name="phone"
		pattern="[0-9+\-\(\)\s]{7,}"
		placeholder="(555) 555-5555"
	>

	<label>Project Type</label>
	<select name="projectType">

		<option value="">Select a project type</option>
		<option>Google Sheets Dashboard</option>
		<option>Spreadsheet Automation</option>
		<option>Workflow Tracker</option>
		<option>Data Cleanup / Organization</option>
		<option>Other</option>

	</select>

	<label>Tell me about the project</label>

	<textarea
		name="details"
		rows="4"
		placeholder="Describe what you're trying to build..."
	></textarea>

	<label>Budget</label>

	<select name="budget">

		<option value="">Select a budget</option>
		<option>Unsure</option>
		<option>Under $50</option>
		<option>$50 – $150</option>
		<option>$150 – $500</option>
		<option>$500+</option>

	</select>

	<input type="hidden" name="template" id="templateField">
	<input type="hidden" name="source" id="sourceField">

	<button type="submit" class="submit-button">
		Send Inquiry
	</button>

</form>

<div id="formMessage"></div>

</section>

</main>

<footer>
	<p>&copy; 2026 Gotham Solutions</p>
</footer>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxc9_hlQCGvBhvR8CTxNIYGdBt7pfNBy3m51jCEInJPqs_rvo7NSJcQvLVQ2DQR7OGX/exec";

const form = document.getElementById("contactForm");
const templateField = document.getElementById("templateField");
const sourceField = document.getElementById("sourceField");
const messageBox = document.getElementById("formMessage");

const params = new URLSearchParams(window.location.search);

if (params.has("template")) {
	templateField.value = params.get("template");
} else {
	templateField.value = "";
}

if (params.has("source")) {
	sourceField.value = params.get("source");
} else {
	sourceField.value = "Website";
}

form.addEventListener("submit", function(e){

	e.preventDefault();

	const formData = new FormData(form);

	fetch(scriptURL, {
		method: "POST",
		mode: "no-cors",
		body: formData
	})
	.then(() => {

		form.style.display = "none";

		messageBox.style.display = "block";
		messageBox.innerHTML =
			"<strong>Thanks! Your inquiry has been sent.</strong><br>I usually respond within 24 hours.";

	})
	.catch(err => {

		console.error(err);

		messageBox.style.display = "block";
		messageBox.innerHTML =
			"Something went wrong. Please try again.";

	});

});

</script>

</body>
</html>
