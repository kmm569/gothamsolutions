<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Leave a Review | Gotham Solutions</title>
		<link rel="stylesheet" href="../../styles.css" />
	</head>

	<body>
		<header>
			<div class="logo-container">
				<img
					href="/"
					src="../../LogoSolo.png"
					alt="Gotham Solutions Logo"
					class="logo"
				/>
				<h1>Gotham Solutions</h1>
			</div>

			<nav>
				<ul>
					<li><a href="/" class="nav-link">Home</a></li>
					<li><a href="/templates/" class="nav-link">Templates</a></li>
					<li><a href="/about/" class="nav-link">About</a></li>
					<li><a href="/contact/" class="nav-link">Contact</a></li>
					<li><a href="/reviews/" class="nav-link">Reviews</a></li>
				</ul>
			</nav>
		</header>

		<main>
			<div class="content-wrapper">
				<section class="hero">
					<h2>Leave a Review</h2>
					<p class="hero-text">
						Your feedback helps other businesses know what to expect.
					</p>
				</section>

				<p id="invoiceLabel"></p>

				<form class="review-form" id="reviewForm">
					<label>Your Name</label>
					<input type="text" id="name" required />

					<label>Rating</label>

<div class="star-rating" id="starRating">
	<span data-value="1">★</span>
	<span data-value="2">★</span>
	<span data-value="3">★</span>
	<span data-value="4">★</span>
	<span data-value="5">★</span>
</div>

<input type="hidden" id="rating" value="5">

					<label>Review</label>
					<textarea id="review" required></textarea>

					<button type="submit">Submit Review</button>
				</form>
			</div>
		</main>

		<footer>
			<div class="container">
				<p>© Gotham Solutions</p>
			</div>
		</footer>

		<script>
			const API =
				"https://script.google.com/macros/s/AKfycbwKmVo3ZUbQQKJZX6465AFCs7X93Y6zOUUWhPNcIFCREsZjv8862jFix98XCnKtpo5Diw/exec";

			const params = new URLSearchParams(window.location.search);
			const token = params.get("token");

			//document.getElementById("token").value = token;

			async function validateToken() {
				if (!token) {
					document.getElementById("status").innerText =
						"This review link is missing a token.";
					document.querySelector(".review-form").style.display = "none";
					return;
				}

				const res = await fetch(API + "?action=validate&token=" + token);
				const data = await res.json();

				if (!data.valid) {
					document.getElementById("status").innerText =
						"This review link is invalid or already used.";

					document.querySelector(".review-form").style.display = "none";
				} else {
					document.getElementById("status").innerText =
						"Submitting review for invoice " + data.invoice;
				}
			}

			validateToken();

			const form = document.querySelector(".review-form");

form.addEventListener("submit", async function(e) {

	e.preventDefault();

	const payload = {
		token: token,
		name: document.getElementById("name").value,
		rating: document.getElementById("rating").value,
		review: document.getElementById("review").value
	};

	const response = await fetch(API, {
		method: "POST",
		body: new URLSearchParams(payload)
	});

	const text = await response.text();

	if (text === "success") {

		document.querySelector(".content-wrapper").innerHTML = `
			<h2>Thank you for your review!</h2>
			<p>Your feedback helps other businesses know what to expect.</p>
			<a class="button-primary" href="/reviews">View Reviews</a>
		`;

	} else {

		alert("Invalid or already-used review link.");

	}

});

			const header = document.querySelector("header");

			let isShrunk = false;

			const shrinkPoint = 10;
			const expandPoint = 2;

			window.addEventListener("scroll", () => {
				const scroll = window.scrollY;

				if (!isShrunk && scroll > shrinkPoint) {
					header.classList.add("scrolled");
					isShrunk = true;
				}

				if (isShrunk && scroll < expandPoint) {
					header.classList.remove("scrolled");
					isShrunk = false;
				}
			});

			window.addEventListener("load", () => {
	if (window.scrollY > shrinkPoint) {
		header.classList.add("scrolled");
		isShrunk = true;
	}
});
		</script>
	</body>
</html>
